<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Pulse | Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #030712; 
        }

        #map { 
            height: 100vh; 
            width: 100vw; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        /* Header elementlərinin xəritənin üstündə görünməsi üçün */
        .ui-overlay { 
            z-index: 1000; 
            pointer-events: none; 
        }
        
        .ui-overlay * { 
            pointer-events: auto; 
        }

        .sidebar-transition { 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* Xəritənin qaranlıq dizaynını daha da tündləşdirmək üçün filter (opsional) */
        .leaflet-container {
            background: #030712 !important;
        }
    </style>
</head>
<button id="admin-btn" class="fixed bottom-8 right-8 z-[2500] bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-2xl hover:bg-red-600 transition-all shadow-2xl group">
    <svg class="w-6 h-6 text-white group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
    </svg>
</button>

<div id="admin-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[3000] hidden items-center justify-center p-4">
    <div class="bg-gray-950 border border-gray-800 w-full max-w-md rounded-3xl p-8 shadow-2xl relative">
        <button id="close-admin" class="absolute top-6 right-6 text-gray-500 hover:text-white text-2xl">&times;</button>
        
        <h2 class="text-2xl font-black italic text-white mb-6 uppercase tracking-tighter">
            <span class="text-red-600">Admin</span> Control
        </h2>

        <form id="admin-form" class="space-y-4">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Şəhər Adı</label>
                <input type="text" id="city-name" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-all">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Enlik (Lat)</label>
                    <input type="number" step="any" id="city-lat" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-all">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Uzunluq (Lon)</label>
                    <input type="number" step="any" id="city-lon" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-all">
                </div>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Temperatur (°C)</label>
                <input type="number" id="city-temp" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition-all">
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl mt-4 transition-all shadow-[0_0_20px_rgba(220,38,38,0.3)]">
                Şəhəri Əlavə Et
            </button>
        </form>
    </div>
</div>
<body class="overflow-hidden text-gray-100">

    <div id="map"></div>

    <header class="ui-overlay fixed top-0 left-0 w-full p-8 flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter leading-none flex items-center">
                <span class="text-red-600 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">HEAT</span>
                <span class="text-white ml-1 font-light italic">PULSE</span>
            </h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-[0.4em] mt-2 ml-1 font-bold">Advanced Thermal Analytics</p>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative">
                <input type="text" id="map-search" 
                       class="bg-gray-900/80 border border-gray-700/50 rounded-full py-2 px-6 w-64 text-sm focus:outline-none focus:border-red-600 backdrop-blur-xl transition-all duration-300 placeholder-gray-500 shadow-2xl" 
                       placeholder="Şəhər axtar...">
            </div>
            
            <button id="toggle-mode" class="bg-gray-900/80 border border-gray-700 p-2.5 rounded-full px-5 text-[10px] uppercase font-bold tracking-widest hover:border-red-600 hover:text-red-500 transition-all shadow-2xl backdrop-blur-xl">
                Colorful Mode
            </button>
        </div>
    </header>

    <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[1500] hidden transition-opacity duration-500"></div>

    <aside id="sidebar" class="sidebar-transition fixed top-0 left-0 h-full w-[450px] bg-gray-950/98 border-r border-gray-800 z-[2000] -translate-x-full shadow-2xl overflow-y-auto">
        <div class="p-10 h-full flex flex-col relative">
            <button id="close-btn" class="absolute top-8 right-8 text-gray-500 hover:text-white text-4xl font-thin transition-colors">&times;</button>
            
            <div id="sidebar-content" class="mt-12">
                <div class="flex flex-col items-center justify-center h-64 text-gray-600 italic text-center">
                    <svg class="w-12 h-12 mb-4 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path d="M10 20a10 10 0 1 1 0-20 10 10 0 0 1 0 20zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm-1-7.5l4-4L14.5 8l-4 4L6 7.5 7.5 6l1.5 1.5z"/></svg>
                    <p>Təhlil üçün xəritədən bir nöqtə seçin</p>
                </div>
            </div>
        </div>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
